name: CI / PR

on:
  pull_request:
    branches: [main]
    paths:
      - 'pokedex/**'
      - '.github/workflows/ci-pr.yml'

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & test
    runs-on: macos-26
    timeout-minutes: 25
    env:
      PROJECT: pokedex/pokedex.xcodeproj
      SCHEME: pokedex
      DESTINATION: 'platform=iOS Simulator,name=iPhone 17'

    steps:
      - uses: actions/checkout@v4

      - name: Pin Xcode 26.4.1
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4.1'

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: derived-${{ runner.os }}-xcode26-${{ hashFiles('pokedex/pokedex.xcodeproj/project.pbxproj') }}
          restore-keys: |
            derived-${{ runner.os }}-xcode26-

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun simctl list devices available | head -40

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DESTINATION" \
            -resultBundlePath build/pokedex.xcresult \
            -enableCodeCoverage YES \
            test | xcbeautify --renderer github-actions

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-pr-${{ github.event.pull_request.number }}
          path: build/pokedex.xcresult
          retention-days: 7
