included:
  - pokedex/pokedex
  - pokedex/pokedexTests

excluded:
  - pokedex/pokedex.xcodeproj
  - "**/*.xcdatamodeld"
  - "**/*.xcassets"

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - first_where
  - last_where
  - toggle_bool

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id

reporter: "xcode"
